site_name: Monty
site_description: A minimal, secure Python interpreter written in Rust for use by AI.
docs_dir: docs
nav:
  - Home: index.md
  - Overview: overview.md
  - Setup: setup.md
plugins:
  - techdocs-core
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
